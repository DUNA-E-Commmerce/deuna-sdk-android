name: Integration Tests

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Enable widgets-in-modal module
        run: |
          sed -i 's|//include( "widgets-in-modal")|include("widgets-in-modal")|' settings.gradle.kts
          sed -i 's|//project(":widgets-in-modal").projectDir|project(":widgets-in-modal").projectDir|' settings.gradle.kts

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-${{ runner.os }}
          restore-keys: |
            avd-api-31-

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot-save
          disable-animations: true
          script: |
            set -eu
            mkdir -p artifacts/test-videos
            STOP_FILE="/tmp/stop_screenrecord_segments"

            adb wait-for-device
            rm -f "${STOP_FILE}"
            adb shell rm -f /sdcard/integration-tests-*.mp4 || true

            # Record screen in rolling segments to avoid screenrecord time limits.
            (
              SEGMENT=1
              while true; do
                VIDEO_REMOTE_PATH="/sdcard/integration-tests-${SEGMENT}.mp4"
                adb shell rm -f "${VIDEO_REMOTE_PATH}" || true
                adb shell "screenrecord --time-limit 170 --bit-rate 6000000 ${VIDEO_REMOTE_PATH}" >/dev/null 2>&1 || true
                if [ -f "${STOP_FILE}" ]; then
                  break
                fi
                SEGMENT=$((SEGMENT + 1))
              done
            ) &
            SCREENRECORD_LOOP_PID=$!

            set +e
            ./gradlew :widgets-in-modal:connectedAndroidTest
            TEST_EXIT_CODE=$?
            set -e

            # Stop recording and fetch videos regardless of test result.
            touch "${STOP_FILE}"
            adb shell pkill -INT screenrecord >/dev/null 2>&1 || true
            wait "${SCREENRECORD_LOOP_PID}" || true

            for SEGMENT in $(seq 1 30); do
              VIDEO_REMOTE_PATH="/sdcard/integration-tests-${SEGMENT}.mp4"
              VIDEO_LOCAL_PATH="artifacts/test-videos/integration-tests-${SEGMENT}.mp4"
              adb pull "${VIDEO_REMOTE_PATH}" "${VIDEO_LOCAL_PATH}" >/dev/null 2>&1 || true
              adb shell rm -f "${VIDEO_REMOTE_PATH}" || true
            done

            exit "${TEST_EXIT_CODE}"

      - name: Upload failed test video
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-video
          path: artifacts/test-videos/*.mp4
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: examples/widgets-in-modal/build/reports/androidTests/
